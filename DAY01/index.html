<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--
     - Using defer in external script tag
     - This means the script will be downloaded in parallel to parsing the HTML
     - The script will only execute after parsing is completed and script has finsished downloading
     -->
    <script src="script.js" defer></script>

</head>
<body>
    <h1>Hello, 40 days of JS!</h1>
</body>
</html>
